name: Deploy Production

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_ROOT: ${{ secrets.VPS_APP_ROOT }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            web/frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: web

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web/frontend

      - name: Build frontend
        env:
          SHOPIFY_API_KEY: ${{ secrets.SHOPIFY_API_KEY }}
        run: npm run build
        working-directory: web/frontend

      - name: Package release
        run: |
          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=node_modules \
            --exclude=web/node_modules \
            --exclude=web/frontend/node_modules \
            --exclude=web/floating_cart_button.sqlite \
            --exclude=web/floating_cart_button_analytics.db \
            -czf release.tgz .

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${VPS_PORT:-22}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload release bundle
        run: |
          scp -P "${VPS_PORT:-22}" release.tgz "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/floating-solnix-release.tgz"

      - name: Deploy on VPS
        run: |
          ssh -p "${VPS_PORT:-22}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" <<'EOF'
          set -e
          APP_ROOT="${{ secrets.VPS_APP_ROOT }}"
          if [ -z "$APP_ROOT" ]; then
            APP_ROOT="/var/www/floating-solnix"
          fi
          RELEASE_DIR="$APP_ROOT/releases/${{ github.sha }}"
          mkdir -p "$APP_ROOT/releases"
          rm -rf "$RELEASE_DIR"
          mkdir -p "$RELEASE_DIR"
          tar -xzf /tmp/floating-solnix-release.tgz -C "$RELEASE_DIR"
          printf '%s\n' "${{ secrets.PRODUCTION_ENV }}" > "$RELEASE_DIR/web/.env"
          ln -sfn "$RELEASE_DIR" "$APP_ROOT/current"
          cd "$APP_ROOT/current/web"
          npm ci --omit=dev
          cd "$APP_ROOT/current"
          pm2 startOrReload ecosystem.config.cjs --env production
          pm2 save
          EOF
